<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 | Server Monitoring</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>회원가입</h1>
            <p>OpsWatcher 계정 생성</p>
        </div>

        <div th:if="${param.error}" class="alert alert-error">
            이미 존재하는 아이디입니다.
        </div>

        <form method="post" action="/signup" class="login-form">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" placeholder="사용할 아이디 입력" required>

            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" placeholder="사용할 비밀번호 입력" required>

            <button type="submit">회원가입</button>
        </form>

        <div class="login-info">
            <p>이미 계정이 있나요?</p>
            <a href="/login">로그인으로 돌아가기</a>
        </div>
    </div>
</div>

</body>
</html>
